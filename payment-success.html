<body>




<header>

<div class="container">





<h1>

🎉 支付成功

</h1>





<h2>

<div id="order-info">

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script>


const SUPABASE_URL =
"https://ukxxmxnubxjezkwbbxdr.supabase.co";


const SUPABASE_KEY =
"sb_publishable_2IFHfms3ombozpvZCvaeEg_2VZ2z5hJ";



const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);







const params =
new URLSearchParams(
window.location.search
);



const orderId =
params.get("order");







async function loadOrder(){



if(!orderId){


document.getElementById(
"order-info"
).innerHTML=

"订单不存在";


return;


}







const {data,error}=await client
.from("orders")
.select("*")
.eq(
"id",
orderId
)
.single();







if(error){


document.getElementById(
"order-info"
).innerHTML=

"订单查询失败";


return;


}








document.getElementById(
"order-info"
).innerHTML=

`

<h3>

订单编号：

${data.id}

</h3>



<p>

商品：

${data.product_name}

</p>




<p>

金额：

¥${data.price}

</p>




<p>

订单状态：

${data.status || "处理中"}

</p>


`;





}



loadOrder();



</script>







</body>
