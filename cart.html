<!DOCTYPE html>
<html>


<head>


<meta charset="UTF-8">


<title>
购物车
</title>


<link rel="stylesheet" href="css/style.css">


</head>



<body>



<h1>
我的购物车
</h1>



<a href="product.html">

继续购物

</a>


<hr>


<div id="cart-list"></div>



<h2 id="total"></h2>




<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>



<script>



const SUPABASE_URL =
"https://ukxxmxnubxjezkwbbxdr.supabase.co";



const SUPABASE_KEY =
"sb_publishable_2IFHfms3ombozpvZCvaeEg_2VZ2z5hJ";




const client =

supabase.createClient(

SUPABASE_URL,

SUPABASE_KEY

);





let cart =

JSON.parse(

localStorage.getItem("cart")

||

"[]"

);





console.log(
"当前购物车:",
cart
);






async function loadCart(){



let html="";


let total=0;





for(let item of cart){





const {data,error}=await client

.from("products")

.select("*")

.eq(

"id",

item.id

)

.single();





if(error){


console.log(error);


continue;


}






let qty =

item.quantity || 1;





total +=

Number(data.price)

*

qty;







html+=`

<div class="card">


<img src="${data.image}">



<h3>

${data.name}

</h3>



<p>

价格：

¥${data.price}

</p>



<p>

数量：

${qty}

</p>




<button onclick="changeQty(${data.id},1)">

+

</button>



<button onclick="changeQty(${data.id},-1)">

-

</button>



<button onclick="removeCart(${data.id})">

删除

</button>


</div>


`;



}







if(html===""){


html="<h2>购物车为空</h2>";


}




document.getElementById(

"cart-list"

).innerHTML=html;



document.getElementById(

"total"

).innerHTML=

"总价：¥"+total;




}









function changeQty(id,num){



let item =

cart.find(

x=>x.id==id

);



if(item){


item.quantity += num;


if(item.quantity<1){

item.quantity=1;

}


}


saveCart();


}








function removeCart(id){



cart =

cart.filter(

x=>x.id!=id

);



saveCart();


}









function saveCart(){



localStorage.setItem(

"cart",

JSON.stringify(cart)

);



location.reload();


}







loadCart();



</script>



</body>


</html>
