<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>尊品酒庄 - 酒类商城</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei",sans-serif;
}

body{
    background:#f7f3ee;
    color:#333;
}


/* 顶部导航 */

header{
    background:#120b08;
    color:white;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:28px;
    color:#d4af37;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
}


.search input{
    padding:8px;
    border-radius:20px;
    border:none;
}


/* Banner */

.banner{

    height:420px;
    background:
    linear-gradient(
    rgba(0,0,0,.5),
    rgba(0,0,0,.5)
    ),
    url("https://images.unsplash.com/photo-1510812431401-41d2bd2722f3");

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;

}

.banner h1{
    font-size:55px;
}

.banner p{
    margin:20px;
    font-size:22px;
}


.btn{

background:#d4af37;
padding:12px 30px;
border-radius:30px;
color:#000;
text-decoration:none;

}


/* 分类 */

.category{

padding:40px 8%;
text-align:center;

}

.category h2{

margin-bottom:30px;

}


.category button{

padding:12px 25px;
margin:10px;
border:none;
background:#1d120c;
color:white;
border-radius:20px;

}



/* 商品 */

.products{

padding:20px 8%;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(230px,1fr));

gap:25px;

}


.card{

background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 20px #ddd;

}


.card img{

width:100%;
height:260px;
object-fit:cover;

}


.card h3{

padding:15px;

}


.price{

color:#b8860b;
font-size:22px;
font-weight:bold;
padding:0 15px;

}


.card button{

margin:15px;
width:calc(100% - 30px);

padding:12px;

border:none;

background:#120b08;

color:white;

border-radius:20px;

}



/* 服务 */

.service{

background:#120b08;
color:white;

padding:40px 8%;

display:flex;

justify-content:space-around;

text-align:center;

}


.service div{

max-width:250px;

}


footer{

background:#000;

color:white;

text-align:center;

padding:20px;

}


/* 手机 */

@media(max-width:700px){

header{

flex-direction:column;
gap:20px;

}

.banner h1{

font-size:35px;

}


.service{

flex-direction:column;
gap:20px;

}

}

</style>

</head>


<body>


<header>

<div class="logo">
🍷 尊品酒庄
</div>


<nav>

<a href="#">首页</a>
<a href="#">白酒</a>
<a href="#">红酒</a>
<a href="#">洋酒</a>
<a href="#">啤酒</a>

</nav>


<div class="search">

<input placeholder="搜索酒品">

</div>


</header>



<section class="banner">


<div>

<h1>
品味世界佳酿
</h1>

<p>
精选全球名酒 · 专业仓储 · 极速配送
</p>

<a class="btn">
立即选购
</a>


</div>


</section>




<section class="category">

<h2>
热门分类
</h2>


<button>
中国白酒
</button>

<button>
法国红酒
</button>

<button>
进口洋酒
</button>

<button>
精酿啤酒
</button>


</section>




<section class="products">



<div class="card">

<img src="https://images.unsplash.com/photo-1569529465841-dfecdab7503b">

<h3>
贵州酱香白酒
</h3>

<p class="price">
¥899
</p>

<button>
加入购物车
</button>

</div>




<div class="card">

<img src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3">

<h3>
法国干红葡萄酒
</h3>

<p class="price">
¥399
</p>

<button>
加入购物车
</button>

</div>




<div class="card">

<img src="https://images.unsplash.com/photo-1527281400683-1aae777175f8">

<h3>
苏格兰威士忌
</h3>

<p class="price">
¥699
</p>

<button>
加入购物车
</button>

</div>




<div class="card">

<img src="https://images.unsplash.com/photo-1516455207990-7a41ce80f7ee">

<h3>
进口精酿啤酒
</h3>

<p class="price">
¥99
</p>

<button>
加入购物车
</button>

</div>



</section>




<section class="service">


<div>

<h3>
🚚 极速配送
</h3>

<p>
全国冷链运输
</p>

</div>



<div>

<h3>
🏆 正品保障
</h3>

<p>
全球酒庄直供
</p>

</div>




<div>

<h3>
💎 专业服务
</h3>

<p>
私人品酒顾问
</p>

</div>



</section>




<footer>

© 2026 尊品酒庄 版权所有

</footer>



<script>

let buttons=document.querySelectorAll(".card button");


buttons.forEach(btn=>{

btn.onclick=function(){

alert("商品已加入购物车");

}

})


</script>


</body>

</html>
