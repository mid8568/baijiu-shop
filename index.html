<!-- Supabase -->

<script>


// 显示购物车数量


function updateCartCount(){



let cart =
JSON.parse(

localStorage.getItem("cart")

||
"[]"

);

let count =
cart.reduce(
(sum,item)=>
sum+item.quantity,
0
);


document.getElementById(
"cart-count"
).innerHTML=

"购物车 "
+
count;



}




updateCartCount();



</script>
