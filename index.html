<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>国韵白酒商城</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Microsoft YaHei";
}

body{
background:#f8f3ea;
color:#333;
}


/* 顶部 */

header{

background:#160b05;
color:white;

padding:20px 8%;

display:flex;

justify-content:space-between;

align-items:center;

}

.logo{

font-size:30px;

font-weight:bold;

color:#d4af37;

}


nav a{

color:white;

text-decoration:none;

margin:15px;

}



.cart{

background:#d4af37;

color:#000;

padding:8px 18px;

border-radius:20px;

}



/* 首页大图 */

.banner{

height:450px;

background:

linear-gradient(
rgba(0,0,0,.55),
rgba(0,0,0,.55)
),

url("https://images.unsplash.com/photo-1598301257982-0cf014dabbcd");


background-size:cover;

background-position:center;


display:flex;

justify-content:center;

align-items:center;

text-align:center;

color:white;

}



.banner h1{

font-size:60px;

}


.banner p{

font-size:24px;

margin:20px;

}



.btn{

display:inline-block;

background:#d4af37;

padding:12px 35px;

border-radius:30px;

color:#000;

text-decoration:none;

}





/* 商品 */

.title{

text-align:center;

padding:50px 0 20px;

font-size:35px;

}



.products{

padding:30px 8%;

display:grid;

grid-template-columns:

repeat(auto-fit,minmax(240px,1fr));

gap:30px;

}




.card{

background:white;

border-radius:15px;

overflow:hidden;

box-shadow:0 5px 20px #ddd;

}



.card img{

width:100%;

height:300px;

object-fit:cover;

}




.card h3{

padding:15px;

font-size:22px;

}



.desc{

padding:0 15px;

color:#777;

}



.price{

padding:15px;

font-size:25px;

font-weight:bold;

color:#b8860b;

}



button{

margin:0 15px 20px;

width:calc(100% - 30px);

padding:12px;

border:none;

border-radius:25px;

background:#160b05;

color:white;

}





/* 品牌介绍 */


.brand{

background:#160b05;

color:white;

padding:50px 10%;

text-align:center;

line-height:2;

}




footer{

background:#000;

color:white;

text-align:center;

padding:20px;

}




@media(max-width:700px){

header{

flex-direction:column;

gap:15px;

}


.banner h1{

font-size:38px;

}


}

</style>

</head>


<body>


<header>

<div class="logo">
🍶 国韵白酒
</div>


<nav>

<a href="#">
首页
</a>

<a href="#">
酱香白酒
</a>

<a href="#">
浓香白酒
</a>

<a href="#">
收藏酒
</a>

</nav>


<div class="cart">

购物车 0

</div>


</header>





<section class="banner">


<div>

<h1>
中国白酒 · 国酒之韵
</h1>

<p>
精选名酒 | 原浆酿造 | 品质保证
</p>


<a class="btn">
立即购买
</a>


</div>


</section>






<h2 class="title">
热门白酒
</h2>



<section class="products">



<div class="card">

<img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81">


<h3>
53度酱香白酒
<h3>
<a href="product.html">
53度酱香白酒
</a>
</h3>

<p class="price">
¥1299
</p>

<a href="product.html">
<button>
查看商品
</button>
</a>

</div>





<div class="card">

<img src="https://images.unsplash.com/photo-1569529465841-dfecdab7503b">


<h3>
珍藏级白酒
</h3>

<p class="desc">
年份窖藏 收藏佳品
</p>


<p class="price">
¥899
</p>


<button>
加入购物车
</button>

</div>






<div class="card">

<img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b">


<h3>
浓香型白酒
</h3>

<p class="desc">
绵柔入口 回味悠长
</p>


<p class="price">
¥599
</p>


<button>
加入购物车
</button>


</div>





<div class="card">

<img src="https://images.unsplash.com/photo-1527281400683-1aae777175f8">


<h3>
限量收藏酒
</h3>


<p class="desc">
大师酿造 限量发行
</p>


<p class="price">
¥1999
</p>


<button>
加入购物车
</button>


</div>



</section>






<section class="brand">


<h2>
国韵白酒品牌理念
</h2>

<p>

传承千年酿酒文化，
精选优质粮食，
采用传统发酵工艺，
打造中国白酒精品。

</p>


</section>






<footer>

© 2026 国韵白酒商城

</footer>



<script>

let count=0;

document.querySelectorAll("button")
.forEach(btn=>{

btn.onclick=function(){

count++;

document.querySelector(".cart")
.innerHTML="购物车 "+count;

}

});

</script>



</body>
</html>
