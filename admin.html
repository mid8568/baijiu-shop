<!DOCTYPE html>

<html lang="zh-CN">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>
国韵白酒后台管理
</title>


<link rel="stylesheet" href="css/style.css">


</head>



<body>



<header>


<div class="logo">

🍶 国韵白酒后台

</div>



<button onclick="logout()">

退出登录

</button>


</header>







<div class="container">


<h1>

添加白酒商品

</h1>





<input 
id="name"
type="text"
placeholder="白酒名称">





<input 
id="price"
type="number"
placeholder="价格">





<input 
id="image"
type="text"
placeholder="图片地址">





<textarea

id="description"

placeholder="商品介绍">

</textarea>






<input

id="stock"

type="number"

placeholder="库存数量">






<!-- 商品分类 -->

<select id="category">


<option value="酱香型">

酱香型

</option>



<option value="浓香型">

浓香型

</option>



<option value="清香型">

清香型

</option>



<option value="收藏酒">

收藏酒

</option>



</select>






<button onclick="addProduct()">

添加商品

</button>




</div>









<div class="container">


<h2>

商品管理

</h2>



<div id="product-list">

加载商品中...

</div>



</div>









<div class="container">


<h2>

订单管理

</h2>



<div id="order-list">

加载订单中...

</div>



</div>








<footer>

© 2026 国韵白酒商城后台

</footer>








<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>




<script src="js/admin.js"></script>





</body>


</html>
