<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>酒类商城</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<h1>酒类商城</h1>
  
<a href="index.html">

🏠 返回首页

</a>


&nbsp;&nbsp;

<a href="cart.html">

🛒 查看购物车

</a>


<div id="product-list"></div>



<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>


<script>


const SUPABASE_URL =
"https://ukxxmxnubxjezkwbbxdr.supabase.co";


const SUPABASE_KEY =
"sb_publishable_2IFHfms3ombozpvZCvaeEg_2VZ2z5hJ";


const client =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);



async function loadProducts(){


const {data,error}=await client
.from("products")
.select("*");



if(error){

console.log(error);
return;

}



let html="";



data.forEach(p=>{


html+=`

<div>


<img src="${p.image}" width="150">


<h3>${p.name}</h3>


<p>价格：¥${p.price}</p>



<button onclick="addCart(${p.id})">

加入购物车

</button>


</div>

`;



});



document.getElementById(
"product-list"
).innerHTML=html;



}





function addCart(id){



let cart =
JSON.parse(
localStorage.getItem("cart")
||
"[]"
);



let item =
cart.find(
x=>x.id==id
);



if(item){


item.quantity++;


}else{


cart.push({

id:id,

quantity:1

});


}



localStorage.setItem(

"cart",

JSON.stringify(cart)

);



alert("加入购物车成功");


}



loadProducts();


</script>


</body>
</html>
